<script type="text/javascript">
(function($) {
    window.changeaccounts = function() {
        var source = $("#id_account_source");
        var dest = $("#id_account_destination");
        var amountField = $("#id_amount_actual"); // Renamed for clarity

        if (source.length && dest.length) {
            // 1. Swap the account values
            var temp = source.val();
            source.val(dest.val()).trigger('change');
            dest.val(temp).trigger('change');

            // 2. Flip the sign of the amount
            if (amountField.length) {
                var currentVal = parseFloat(amountField.val()) || 0;
                amountField.val(currentVal * -1).trigger('change');
            }
        } else {
            console.warn("Account source or destination fields not found.");
        }
    };
})(jQuery);
</script>
