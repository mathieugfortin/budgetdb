<!--_system_board_modal.html-->
{% load static %}
<link rel="stylesheet" type="text/css">

<div class="modal fade" id="systemHealthModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg bg-dark text-light">

            <div class="modal-header py-3 border-bottom border-secondary">
                <h5 class="modal-title d-flex align-items-center fw-bold" id="systemHealthModalLabel">
                    <span class="material-symbols-outlined me-2 text-info">monitoring</span>
                    System Board
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body p-4">
                <div class="card bg-secondary bg-opacity-10 border-secondary mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h6 class="text-uppercase text-info fw-bold mb-1" style="font-size: 0.75rem; letter-spacing: 1px;">
                                    Maintenance Task
                                </h6>
                                <h4 class="mb-0">Ledger Scheduler</h4>
                            </div>
                            <div id="status-badge" class="badge bg-primary px-3 py-2">
                                <span id="ledger-status-text">Checking...</span>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-sm-6">
                                <div class="p-3 border border-secondary rounded bg-dark bg-opacity-50">
                                    <small class="text-secondary d-block">Last Successful Run</small>
                                    <span id="ledger-last-run" class="fw-mono text-light">...</span>
                                </div>
                            </div>
                            <div class="col-sm-6 d-flex align-items-center">
                                <button type="button" onclick="triggerManualExtension()" id="btn-sync" 
                                        class="btn btn-info w-100 d-flex align-items-center justify-content-center py-3">
                                    <span class="material-symbols-outlined me-2">sync</span>
                                    Run Manual Extension
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="sync-progress" class="progress d-none" style="height: 4px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 100%"></div>
                </div>




                <div class="card bg-danger bg-opacity-10 border-danger mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h6 class="text-uppercase text-danger fw-bold mb-1" style="font-size: 0.75rem; letter-spacing: 1px;">
                                    Critical Maintenance
                                </h6>
                                <h4 class="mb-0">Ledger Rebuild</h4>
                            </div>
                            <div id="rebuild-status-badge" class="badge bg-secondary px-3 py-2">
                                <span id="rebuild-status-text">Ready</span>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-sm-12">
                                <button type="button" onclick="triggerNuclearRebuild()" id="btn-rebuild" 
                                        class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center py-3">
                                    <span class="material-symbols-outlined me-2">restart_alt</span>
                                    Run Nuclear Rebuild (Wipe & Recalculate)
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="rebuild-progress" class="progress d-none" style="height: 4px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-danger" style="width: 100%"></div>
                </div>



            </div>
        </div>
    </div>
</div>
